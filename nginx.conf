server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;

    # Use Docker's internal DNS; resolve at runtime, not startup
    resolver 127.0.0.11 8.8.8.8 valid=30s ipv6=off;

    # Static SPA files
    location /folding/ {
        try_files $uri $uri/ /folding/index.html;
    }

    # GoWe API proxy (SSE-friendly)
    # Note: variable-based proxy_pass disables automatic URI rewriting,
    # so we use an explicit rewrite to strip the /folding prefix.
    location /folding/api/ {
        set $gowe_upstream https://gowe.software-smithy.org;
        rewrite ^/folding(/api/.*)$ $1 break;
        proxy_pass $gowe_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host gowe.software-smithy.org;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
    }

    # BV-BRC authentication proxy
    location /folding/auth/ {
        set $auth_upstream https://user.patricbrc.org;
        rewrite ^/folding/auth/(.*)$ /$1 break;
        proxy_pass $auth_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host user.patricbrc.org;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Workspace JSON-RPC proxy
    location /folding/ws-api/ {
        set $ws_upstream https://p3.theseed.org;
        rewrite ^/folding/ws-api/(.*)$ /services/Workspace/$1 break;
        proxy_pass $ws_upstream;
        proxy_http_version 1.1;
        proxy_set_header Host p3.theseed.org;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }
}

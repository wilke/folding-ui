server {
    listen 80;
    server_name _;

    # Static SPA files
    location /folding/ {
        alias /usr/share/nginx/html/folding/;
        try_files $uri $uri/ /folding/index.html;
    }

    # GoWe API proxy (SSE-friendly)
    location /folding/api/ {
        proxy_pass https://gowe.software-smithy.org/api/;
        proxy_http_version 1.1;
        proxy_set_header Host gowe.software-smithy.org;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;

        # SSE support
        proxy_set_header Connection '';
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding off;
        proxy_read_timeout 3600s;
    }

    # BV-BRC authentication proxy
    location /folding/auth/ {
        proxy_pass https://user.patricbrc.org/;
        proxy_http_version 1.1;
        proxy_set_header Host user.patricbrc.org;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Workspace JSON-RPC proxy
    location /folding/ws-api/ {
        proxy_pass https://p3.theseed.org/services/Workspace/;
        proxy_http_version 1.1;
        proxy_set_header Host p3.theseed.org;
        proxy_set_header Authorization $http_authorization;
        proxy_set_header X-Real-IP $remote_addr;
    }
}
